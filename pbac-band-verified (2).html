<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PBAC Regimental Band – Verified</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Bebas+Neue&family=Cinzel:wght@600;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a227;
      --gold-light: #f0d060;
      --blue-deep: #0d1b4b;
      --blue-mid: #1a3a8c;
      --blue-badge: #2952cc;
      --white: #ffffff;
      --verified-green: #00e676;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Cinzel', serif;
      position: relative;
    }

    /* ── background image ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('/mnt/user-data/uploads/band_badge-removed-bg.png') center/cover no-repeat;
      filter: brightness(0.28) saturate(1.1);
      z-index: 0;
    }

    /* dark vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(0,0,10,0.85) 100%);
      z-index: 1;
    }

    /* ── main card ── */
    .card {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 56px 64px 52px;
      background: rgba(5, 15, 50, 0.72);
      border: 1px solid rgba(201,162,39,0.35);
      border-radius: 4px;
      backdrop-filter: blur(18px);
      box-shadow:
        0 0 0 1px rgba(201,162,39,0.12),
        0 0 80px rgba(41,82,204,0.4),
        inset 0 0 60px rgba(0,0,0,0.3);
      animation: cardIn 1s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

    /* ── VERIFIED splash ── */
    .splash {
      display: flex;
      align-items: center;
      gap: 14px;
      animation: splashIn 0.8s 0.2s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes splashIn {
      from { opacity: 0; transform: scale(1.18) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .splash-line {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .splash-line.right {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .splash-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 6vw, 5.4rem);
      letter-spacing: 0.28em;
      background: linear-gradient(160deg, #fff 20%, var(--gold-light) 55%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 24px rgba(201,162,39,0.55));
    }

    /* ── arced band name ── */
    .arc-wrap {
      animation: splashIn 0.9s 0.05s cubic-bezier(.16,1,.3,1) both;
    }

    .genuine-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      letter-spacing: 0.22em;
      background: linear-gradient(160deg, #fff 10%, var(--gold-light) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(201,162,39,0.7));
    }

    /* ── tagline ── */
    .tagline-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: taglineIn 0.9s 0.7s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes taglineIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tagline-rule {
      width: 120px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .tagline {
      font-family: 'Cinzel Decorative', cursive;
      font-weight: 700;
      font-size: clamp(1.1rem, 2.5vw, 1.75rem);
      letter-spacing: 0.18em;
      color: var(--white);
      text-shadow:
        0 0 30px rgba(201,162,39,0.8),
        0 2px 12px rgba(0,0,0,0.6);
      text-transform: uppercase;
    }

    .tagline span {
      color: var(--gold-light);
    }

    /* ── subtle footer band name ── */
    .footer-name {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      animation: taglineIn 0.9s 0.9s both;
    }


  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="vignette"></div>

  <div class="card">

    <!-- Arced band name above VERIFIED -->
    <div class="arc-wrap">
      <svg viewBox="0 0 520 100" width="520" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Shallower arc: large radius = gentle curve, text stays near top -->
          <path id="arc" d="M 20,90 A 310,310 0 0,1 500,90"/>
          <filter id="arcGlow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c9a227"/>
            <stop offset="40%" stop-color="#f0d060"/>
            <stop offset="100%" stop-color="#c9a227"/>
          </linearGradient>
        </defs>
        <text font-family="'Cinzel', serif" font-size="18" font-weight="900"
              letter-spacing="2.5" fill="url(#arcGrad)" filter="url(#arcGlow)" text-anchor="middle">
          <textPath href="#arc" startOffset="50%">PRESBYTERIAN BOYS ARMY CADET REGIMENTAL BAND</textPath>
        </text>
      </svg>
    </div>

    <!-- VERIFIED splash -->
    <div class="splash">
      <div class="splash-line"></div>
      <div class="splash-text">VERIFIED</div>
      <div class="splash-line right"></div>
    </div>

    <!-- TICKET IS GENUINE -->
    <div class="genuine-text">TICKET IS GENUINE</div>

    <!-- Tagline -->
    <div class="tagline-wrap">
      <div class="tagline-rule"></div>
      <div class="tagline"><span>HARMONY</span> IN <span>MOTION!</span></div>
      <div class="tagline-rule"></div>
    </div>

    <!-- footer -->
    <div class="footer-name">Presbyterian Boys Army Cadet · Regimental Band</div>

  </div>

</body>
</html>
